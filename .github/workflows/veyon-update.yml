name: Publish official Veyon RPMs

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # Allows manual triggering of the workflow

permissions:
  contents: write

jobs:
  check-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest Veyon release metadata
        id: get_rpm
        run: |
          set -euo pipefail

          RELEASE_JSON=$(curl -fsSL https://api.github.com/repos/veyon/veyon/releases/latest)

          VERSION=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          SOURCE_TARBALL_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | test("-src\\.tar\\.bz2$")) | .browser_download_url' | head -n 1)
          SOURCE_VERSION=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | test("-src\\.tar\\.bz2$")) | .name | capture("veyon-(?<version>[0-9.]+)-src\\.tar\\.bz2").version' | head -n 1)

          echo "source_tarball_url=$SOURCE_TARBALL_URL" >> "$GITHUB_OUTPUT"
          echo "source_version=$SOURCE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if already processed
        id: cache_check
        run: |
          touch last_version.txt
          CURRENT_RECORD=$(cat last_version.txt)

          if [ "$CURRENT_RECORD" != "${{ steps.get_rpm.outputs.version }}" ]; then
            echo "new_version_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "new_version_found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install download tools
        if: steps.cache_check.outputs.new_version_found == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Download RPM assets
        if: steps.cache_check.outputs.new_version_found == 'true'
        run: |
          set -euo pipefail

          RPM_URLS=$(curl -fsSL https://api.github.com/repos/veyon/veyon/releases/latest | jq -r '.assets[] | select(.name | test("fedora"; "i") and test("\\.rpm$")) | .browser_download_url')

          if [ -z "$RPM_URLS" ]; then
            echo "No Fedora RPM assets were published for this release."
            exit 1
          fi

          mkdir -p downloaded_rpms
          cd downloaded_rpms

          printf '%s\n' "$RPM_URLS" | while IFS= read -r url; do
            [ -n "$url" ] || continue
            echo "Downloading: $url"
            curl -fsSLO "$url"
          done

          ls -la

      - name: Upload RPM artifacts
        if: steps.cache_check.outputs.new_version_found == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: veyon-${{ steps.get_rpm.outputs.version }}-rpm-assets
          path: downloaded_rpms/*.rpm
          if-no-files-found: error

      - name: Update version record
        if: steps.cache_check.outputs.new_version_found == 'true'
        run: |
          echo "${{ steps.get_rpm.outputs.version }}" > last_version.txt
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add last_version.txt
          git commit -m "Automated update: Veyon version to ${{ steps.get_rpm.outputs.version }}"
          git push
